services:
  - type: web
    name: student-os
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: student-os-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SEED_DEMO
        value: "false"
      - key: PYTHON_VERSION
        value: 3.10.x
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

databases:
  - name: student-os-db
    plan: free
    databaseName: student_os
    user: admin
